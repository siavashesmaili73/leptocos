  input{width:100%;padding:12px 14px;font-size:15px;border:1px solid #cfd6e0;border-radius:10px;outline:none;transition:border-color .15s, box-shadow .15s}
  input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,109,176,.15)}
  button{width:100%;padding:12px 14px;font-size:15px;font-weight:600;color:#fff;background:var(--navy);border:0;border-radius:10px;cursor:pointer;transition:background .15s}
  button:hover{background:#16273f}
  button:disabled{opacity:.7;cursor:default}
  .err{min-height:18px;font-size:12.5px;color:#c0392b;margin-top:2px}
  .foot{margin-top:18px;font-size:11.5px;color:#9aa3ae;line-height:1.5}
  .lock{width:34px;height:34px;margin:0 auto 12px;display:block;color:var(--blue)}
</style>

<script>
(function(){
  var data=JSON.parse(document.getElementById('payload').textContent);
  function b64d(s){var bin=atob(s);var u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++){u[i]=bin.charCodeAt(i);}return u;}
  var salt=b64d(data.salt), iv=b64d(data.iv), ct=b64d(data.ct);
  var enc=new TextEncoder();
  var form=document.getElementById('form'), input=document.getElementById('code'), err=document.getElementById('err'), btn=document.getElementById('btn');
  if(!(window.crypto && window.crypto.subtle)){ err.textContent='This browser cannot decrypt the page. Open the link over https.'; }
  async function unlock(pass){
    var km=await crypto.subtle.importKey('raw', enc.encode(pass), {name:'PBKDF2'}, false, ['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2', salt:salt, iterations:data.iters, hash:'SHA-256'}, km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    var buf=await crypto.subtle.decrypt({name:'AES-GCM', iv:iv}, key, ct);
    return new TextDecoder().decode(buf);
  }
  form.addEventListener('submit', async function(e){
    e.preventDefault(); err.textContent=''; btn.disabled=true; btn.textContent='Unlocking...';
    try{
      var html=await unlock(input.value);
      var f=document.createElement('iframe');
      f.style.cssText='position:fixed;inset:0;width:100%;height:100%;border:0;margin:0;padding:0;background:#fff';
      f.setAttribute('allow','clipboard-write');
      document.body.innerHTML=''; document.documentElement.style.margin='0'; document.body.style.margin='0'; document.body.style.background='#fff';
      document.title='LeptoCOS';
      document.body.appendChild(f); f.srcdoc=html;
    }catch(ex){
      btn.disabled=false; btn.textContent='Unlock'; err.textContent='Incorrect passcode. Please try again.'; input.select();
    }
  });
  setTimeout(function(){try{input.focus();}catch(e){}},60);
})();
</script>
