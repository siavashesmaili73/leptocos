name: Apply beta brace refinement

on:
  push:
    paths:
      - '.github/workflows/apply-beta-brace.yml'

permissions:
  contents: write

jobs:
  refine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace old brace glyph with modern vector brace
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('beta/index.html')
          text = path.read_text(encoding='utf-8')

          old = '<span class="group-brace">}</span>'
          new = '<svg class="group-brace" viewBox="0 0 18 100" preserveAspectRatio="none" aria-hidden="true"><path d="M16 2 C8 2 7 14 7 27 V39 C7 47 3 50 1 50 C3 50 7 53 7 61 V73 C7 86 8 98 16 98"/></svg>'
          if old not in text:
              raise SystemExit('Old brace markup not found')
          text = text.replace(old, new)

          text, n1 = re.subn(
              r'#compartment \.cmx \.group-marker\{[^\n]*\}',
              "#compartment .cmx .group-marker{position:absolute!important;inset:7px 4px 7px 7px!important;display:grid!important;grid-template-columns:minmax(0,1fr) 18px!important;align-items:center!important;column-gap:10px!important;white-space:nowrap!important;pointer-events:none!important}",
              text,
              count=1,
          )
          text, n2 = re.subn(
              r'#compartment \.cmx \.group-brace\{[^\n]*\}',
              "#compartment .cmx .group-brace{display:block!important;width:18px!important;height:100%!important;overflow:visible!important;fill:none!important;stroke:#AAB8C6!important;stroke-width:1.45!important;stroke-linecap:round!important;stroke-linejoin:round!important;filter:drop-shadow(0 1px 1px rgba(31,54,78,.06))!important}",
              text,
              count=1,
          )
          text, n3 = re.subn(
              r'#compartment \.cmx td\.group-response \.group-brace\{[^\n]*\}\n#compartment \.cmx td\.group-progression \.group-brace\{[^\n]*\}\n#compartment \.cmx td\.group-other \.group-brace\{[^\n]*\}\n',
              '',
              text,
              count=1,
          )
          text = text.replace(
              '#compartment .cmx .group-marker{left:5px!important;right:3px!important}',
              '#compartment .cmx .group-marker{inset:7px 3px 7px 5px!important}',
          )

          if not (n1 == n2 == n3 == 1):
              raise SystemExit(f'CSS replacement failed: marker={n1}, brace={n2}, sizes={n3}')

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit beta-only change
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add beta/index.html
          git commit -m "Modernize and reverse beta matrix braces"
          git push
