name: Apply beta direct feedback

on:
  push:
    paths:
      - '.github/workflows/apply-beta-direct-feedback.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace mailto with direct AJAX submission
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('beta/index.html')
          text = path.read_text(encoding='utf-8')

          text, n_form = re.subn(
              r'<form class="lc-feedback-form" id="lcFeedbackForm" onsubmit="[^"]*">',
              '<form class="lc-feedback-form" id="lcFeedbackForm">',
              text,
              count=1,
          )

          old_button = '<button class="lc-feedback-submit" type="submit">Send feedback</button>'
          new_button = (
              '<input type="text" name="_honey" tabindex="-1" autocomplete="off" '
              'aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden">'
              '<button class="lc-feedback-submit" type="submit">Send feedback</button>'
              '<p class="lc-feedback-result" id="lcFeedbackResult" aria-live="polite"></p>'
          )
          if old_button not in text:
              raise SystemExit('Submit button markup not found')
          text = text.replace(old_button, new_button, 1)

          css = (
              '\n.lc-feedback-result{min-height:0!important;margin:0!important;text-align:center!important;'
              'font-size:12px!important;line-height:1.4!important;font-weight:650!important;color:#355269!important}'
              '\n.lc-feedback-result.is-success{padding:10px 12px!important;border:1px solid #CDE4DC!important;'
              'border-radius:10px!important;background:#EDF7F3!important;color:#0C6A5F!important}'
              '\n.lc-feedback-result.is-error{padding:10px 12px!important;border:1px solid #E9CFC7!important;'
              'border-radius:10px!important;background:#FCF2EF!important;color:#923F2D!important}'
              '\n.lc-feedback-submit[disabled]{opacity:.68!important;cursor:wait!important;transform:none!important}'
          )
          text, n_css = re.subn(
              r'(const feedbackCss=`\n<style id="lc-feedback-styles">.*?)(\n</style>`;)',
              lambda m: m.group(1) + css + m.group(2),
              text,
              count=1,
              flags=re.S,
          )

          submit_script = r'''
      const feedbackSubmit=`
<script>
(function(){
  var form=document.getElementById('lcFeedbackForm');
  var result=document.getElementById('lcFeedbackResult');
  if(!form||!result)return;
  form.addEventListener('submit',async function(event){
    event.preventDefault();
    if(!form.reportValidity())return;
    if(form.elements['_honey']&&form.elements['_honey'].value)return;
    var button=form.querySelector('.lc-feedback-submit');
    var original=button.textContent;
    button.disabled=true;button.textContent='Sending…';
    result.className='lc-feedback-result';result.textContent='';
    var recipient=String.fromCharCode(115,105,97,118,97,115,104,64,109,115,117,46,101,100,117);
    var area=form.elements['area'].value;
    var reply=form.elements['reply'].value.trim();
    var payload={
      name:form.elements['name'].value.trim()||'Not provided',
      affiliation:form.elements['role'].value.trim()||'Not provided',
      email:reply||'Not provided',
      _replyto:reply||'',
      feedback_area:area,
      feedback:form.elements['message'].value.trim(),
      reference:form.elements['reference'].value.trim()||'Not provided',
      _subject:'LeptoCOS feedback — '+area,
      _template:'table',
      _captcha:'false',
      _honey:''
    };
    try{
      var response=await fetch('https://formsubmit.co/ajax/'+recipient,{
        method:'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body:JSON.stringify(payload)
      });
      var data=await response.json().catch(function(){return{};});
      if(!response.ok||data.success===false)throw new Error('Submission failed');
      form.reset();
      var optional=form.querySelector('.lc-optional');if(optional)optional.open=false;
      result.className='lc-feedback-result is-success';
      result.textContent='Thank you — your feedback has been sent.';
    }catch(error){
      result.className='lc-feedback-result is-error';
      result.textContent='We could not send your feedback. Please try again.';
    }finally{
      button.disabled=false;button.textContent=original;
    }
  });
})();
<\/script>`;
'''

          marker = "      html=html.replace('</head>',layoutCss+feedbackCss+'</head>');"
          if marker not in text:
              raise SystemExit('Final injection marker not found')
          text = text.replace(marker, submit_script + '\n' + marker, 1)
          text = text.replace(
              "html=html.replace('</body>',feedbackMarkup+feedbackMotion+'</body>');",
              "html=html.replace('</body>',feedbackMarkup+feedbackMotion+feedbackSubmit+'</body>');",
              1,
          )

          if n_form != 1 or n_css != 1:
              raise SystemExit(f'Replacement failed: form={n_form}, css={n_css}')

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit beta-only change
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add beta/index.html
          git commit -m "Send beta feedback directly without mail app"
          git push

# trigger 2
