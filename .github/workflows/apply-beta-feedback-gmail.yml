name: Apply beta Gmail feedback relay

on:
  push:
    paths:
      - '.github/triggers/apply-beta-feedback-gmail'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Switch feedback relay and improve activation messaging
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('beta/index.html')
          text = path.read_text(encoding='utf-8')

          old_codes = '115,105,97,118,97,115,104,64,109,115,117,46,101,100,117'
          new_codes = '115,105,97,118,97,115,104,101,115,109,97,105,108,105,55,51,64,103,109,97,105,108,46,99,111,109'
          if old_codes not in text:
              raise SystemExit('Old recipient code not found')
          text = text.replace(old_codes, new_codes, 1)

          old_css = ".lc-feedback-result.is-error{padding:10px 12px!important;border:1px solid #E9CFC7!important;border-radius:10px!important;background:#FCF2EF!important;color:#923F2D!important}"
          new_css = old_css + ".lc-feedback-result.is-pending{padding:10px 12px!important;border:1px solid #D7E2EE!important;border-radius:10px!important;background:#F3F7FB!important;color:#355269!important}"
          if old_css not in text:
              raise SystemExit('Result CSS not found')
          text = text.replace(old_css, new_css, 1)

          old_js = "if(!r.ok||data.success===false)throw Error();form.reset();const optional=form.querySelector('.lc-optional');if(optional)optional.open=false;result.className='lc-feedback-result is-success';result.textContent='Thank you — your feedback has been sent.';"
          new_js = "if(!r.ok||data.success===false)throw Error();const serviceMessage=String(data.message||'');form.reset();const optional=form.querySelector('.lc-optional');if(optional)optional.open=false;if(/activate|activation|confirm|confirmation|verify|verification/i.test(serviceMessage)){result.className='lc-feedback-result is-pending';result.textContent='Activation email sent to the project inbox. Direct delivery will begin after confirmation.';}else{result.className='lc-feedback-result is-success';result.textContent='Thank you — your feedback has been sent.';}"
          if old_js not in text:
              raise SystemExit('Success handler not found')
          text = text.replace(old_js, new_js, 1)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit beta-only change
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add beta/index.html
          git commit -m "Route beta feedback to Gmail and fix activation status"
          git push
