name: Apply beta matrix refinement

on:
  push:
    paths:
      - '.github/workflows/apply-beta-matrix-refresh.yml'

permissions:
  contents: write

jobs:
  update-beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refine beta matrix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('beta/index.html')
          s = path.read_text()

          replacements = {
          "'            <tr class=\"group-start response-start\"><td class=\"groupcell\" rowspan=\"5\"><span>Response</span></td><td class=\"rl\">Response</td>'":
          "'            <tr class=\"group-start response-start\"><td class=\"groupcell group-response\" rowspan=\"5\"><div class=\"group-marker\"><span class=\"group-name\">Response</span><span class=\"group-brace\">}</span></div></td><td class=\"rl\">Response</td>'",

          "'            <tr class=\"group-start section-start\"><td class=\"groupcell\" rowspan=\"2\"><span>Progression</span></td><td class=\"rl\">PFS</td>'":
          "'            <tr class=\"group-spacer\"><td colspan=\"7\"></td></tr>\\n            <tr class=\"group-start progression-start\"><td class=\"groupcell group-progression\" rowspan=\"2\"><div class=\"group-marker\"><span class=\"group-name\">Progression</span><span class=\"group-brace\">}</span></div></td><td class=\"rl\">PFS</td>'",

          "'            <tr class=\"group-start section-start\"><td class=\"groupcell\" rowspan=\"1\"><span>Other</span></td><td class=\"rl\">Other</td>'":
          "'            <tr class=\"group-spacer\"><td colspan=\"7\"></td></tr>\\n            <tr class=\"group-start other-start\"><td class=\"groupcell group-other\" rowspan=\"1\"><div class=\"group-marker\"><span class=\"group-name\">Other</span><span class=\"group-brace\">}</span></div></td><td class=\"rl\">Other</td>'",
          }

          for old, new in replacements.items():
              if old not in s:
                  raise SystemExit(f'Missing expected matrix replacement: {old[:90]}')
              s = s.replace(old, new, 1)

          css = r'''<style id="lc-layout-fixes">
          #landscape #chart-gap{margin-top:18px;padding:4px 0 8px}
          #landscape #chart-gap svg{display:block!important;width:100%!important;min-height:350px!important}
          #compartment .cmx-wrap{overflow-x:auto!important;padding:2px 0 5px!important}
          #compartment .cmx{width:100%!important;min-width:900px!important;table-layout:fixed!important;border-collapse:separate!important;border-spacing:4px 4px!important}
          #compartment .cmx th.group-col{width:132px!important;min-width:132px!important;padding:0!important;cursor:default!important;border-bottom:1px solid var(--line)!important}
          #compartment .cmx th.rl{width:158px!important;min-width:158px!important;text-align:left!important;padding-left:14px!important}
          #compartment .cmx th.ncol{width:58px!important;min-width:58px!important}
          #compartment .cmx thead th{position:static!important;background:transparent!important;border:0!important;border-bottom:1px solid var(--line)!important;padding-top:6px!important;padding-bottom:12px!important;cursor:default!important}
          #compartment .cmx tbody tr:not(.group-spacer){height:58px!important}
          #compartment .cmx td.rl{height:58px!important;padding:0 14px!important;border:0!important;background:transparent!important;vertical-align:middle!important;text-align:left!important;font-size:13px!important;font-weight:650!important}
          #compartment .cmx td.val{width:auto!important;height:58px!important;min-width:0!important;padding:0 8px!important;vertical-align:middle!important;text-align:center!important;border:1px solid rgba(255,255,255,.88)!important;border-radius:9px!important;background-clip:padding-box!important;background-image:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.015))!important;box-shadow:inset 0 0 0 1px rgba(23,53,87,.055),0 1px 2px rgba(23,53,87,.055)!important;font-size:13px!important;font-weight:750!important;transition:transform .16s ease,box-shadow .16s ease!important}
          #compartment .cmx td.val:hover{transform:translateY(-1px)!important;box-shadow:inset 0 0 0 1px rgba(23,53,87,.08),0 4px 10px rgba(23,53,87,.09)!important}
          #compartment .cmx td.ncol{width:58px!important;height:58px!important;padding:0 4px!important;border:0!important;background:transparent!important;text-align:center!important;vertical-align:middle!important;font-size:12px!important;font-weight:700!important}
          #compartment .cmx tr.group-spacer{height:18px!important}
          #compartment .cmx tr.group-spacer td{height:18px!important;padding:0!important;border:0!important;background:transparent!important}
          #compartment .cmx td.groupcell{position:relative!important;width:132px!important;min-width:132px!important;padding:0!important;border:0!important;background:transparent!important;vertical-align:middle!important;overflow:visible!important}
          #compartment .cmx .group-marker{position:absolute!important;left:7px!important;right:4px!important;top:50%!important;transform:translateY(-50%)!important;display:flex!important;align-items:center!important;justify-content:flex-end!important;gap:9px!important;white-space:nowrap!important;pointer-events:none!important}
          #compartment .cmx .group-name{color:#5C6675!important;font-size:10px!important;font-weight:800!important;letter-spacing:.14em!important;text-transform:uppercase!important;line-height:1.15!important}
          #compartment .cmx .group-brace{display:block!important;color:#B8C3CF!important;font-family:Georgia,'Times New Roman',serif!important;font-weight:400!important;line-height:.72!important;transform-origin:center!important}
          #compartment .cmx td.group-response .group-brace{font-size:88px!important;transform:scaleY(2.35)!important}
          #compartment .cmx td.group-progression .group-brace{font-size:64px!important;transform:scaleY(1.25)!important}
          #compartment .cmx td.group-other .group-brace{font-size:42px!important;transform:scaleY(.74)!important}
          #compartment .cmx tfoot td{height:48px!important;padding:7px 9px!important;border:0!important;border-top:1px solid var(--line)!important;background:transparent!important;vertical-align:middle!important}
          #compartment .cmx tfoot td.rl{text-align:left!important;padding-left:14px!important}
          #compartment .cmx td.group-total{border-top:1px solid var(--line)!important;background:transparent!important}
          @media(max-width:860px){#landscape #chart-gap svg{min-height:310px!important}#compartment .cmx{min-width:900px!important}#compartment .cmx .group-marker{left:5px!important;right:3px!important}}
          </style>'''

          pattern = r'<style id="lc-layout-fixes">.*?</style>'
          s2, n = re.subn(pattern, css, s, count=1, flags=re.S)
          if n != 1:
              raise SystemExit('Could not replace lc-layout-fixes block')

          path.write_text(s2)
          PY

      - name: Commit beta-only change
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add beta/index.html
          git commit -m "Refine beta compartment matrix" || exit 0
          git push
