name: Slow live constellation

on:
  push:
    paths:
      - '.slow-constellation-trigger'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Slow constellation to 0.3x
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          old="vx:(Math.random()-.5)*.42,vy:(Math.random()-.5)*.34"
          new="vx:(Math.random()-.5)*.126,vy:(Math.random()-.5)*.102"
          if old not in s:
              raise SystemExit('constellation velocity target not found')
          s=s.replace(old,new,1)
          p.write_text(s,encoding='utf-8')
          PY
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Slow constellation animation to 0.3x"
          git push
