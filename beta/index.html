      const coreChartFn=`
function renderCoreGapLarge(){
  const el=document.getElementById('chart-gap');if(!el)return;
  const items=CORE_ORDER.map(function(c){return{label:c,value:coreStudies[c]||0,color:CORE_COL[c]};});
  const W=760,padL=214,padR=64,rowH=62,top=20,H=top*2+items.length*rowH,mx=studies.length,bw=W-padL-padR;
  let s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" role="img" aria-label="Studies reporting each COMET core area">';
  items.forEach(function(it,i){
    const y=top+i*rowH,bh=31,w=Math.max(2,it.value/mx*bw);
    s+='<text x="'+(padL-13)+'" y="'+(y+21)+'" text-anchor="end" font-size="15" font-weight="600" fill="#333">'+esc(it.label)+'</text>';
    s+='<rect x="'+padL+'" y="'+y+'" width="'+w+'" height="'+bh+'" rx="4" fill="'+it.color+'"><title>'+esc(it.label)+': '+it.value+' studies</title></rect>';
    s+='<text x="'+(padL+w+10)+'" y="'+(y+21)+'" font-size="14" font-weight="600" fill="#555">'+it.value+'</text>';
  });
  s+='</svg>';el.innerHTML=s;
}
`;

      const feedbackMotion=`
<script>
(function(){
  var canvas=document.getElementById('lcFeedbackNetwork');
  if(!canvas)return;
  var ctx=canvas.getContext('2d'),hero=canvas.parentElement;
  var reduced=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var particles=[],count=12;
  function reset(){
    var rect=hero.getBoundingClientRect(),dpr=Math.min(window.devicePixelRatio||1,2);
    canvas.width=Math.max(1,Math.round(rect.width*dpr));
    canvas.height=Math.max(1,Math.round(rect.height*dpr));
    canvas.style.width=rect.width+'px';canvas.style.height=rect.height+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);particles=[];
    for(var i=0;i<count;i++)particles.push({
      x:rect.width*(.38+Math.random()*.66),y:8+Math.random()*Math.max(20,rect.height-16),
      vx:(Math.random()-.5)*.42,vy:(Math.random()-.5)*.34,r:1.15+Math.random()*.85
    });
  }
  function draw(move){
    var w=hero.clientWidth,h=hero.clientHeight;ctx.clearRect(0,0,w,h);
    if(move)particles.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<150||p.x>w+8){p.vx*=-1;p.x=Math.max(150,Math.min(w+8,p.x));}
      if(p.y<5||p.y>h-5){p.vy*=-1;p.y=Math.max(5,Math.min(h-5,p.y));}
    });
    for(var i=0;i<particles.length;i++)for(var j=i+1;j<particles.length;j++){
      var a=particles[i],b=particles[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy),limit=88;
      if(d<limit){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle='rgba(255,255,255,'+(.26*(1-d/limit)).toFixed(3)+')';ctx.lineWidth=.75;ctx.stroke();}
    }
    particles.forEach(function(p){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.58)';ctx.fill();});
  }
  function frame(){draw(true);requestAnimationFrame(frame);}
  reset();draw(false);if(!reduced)requestAnimationFrame(frame);
  window.addEventListener('resize',function(){reset();draw(false);});
})();
<\/script>`;
