<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>LeptoCOS Beta</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#171B23;background:#fff}
    .loading{max-width:720px;margin:80px auto;padding:0 24px;line-height:1.6}
    .error{color:#9A431B}
  </style>
</head>
<body>
  <div class="loading" id="status">Loading the LeptoCOS beta preview…</div>
  <script>
  (async function () {
    const status = document.getElementById('status');
    try {
      const response = await fetch('../index.html', { cache: 'no-store' });
      if (!response.ok) throw new Error('Could not load the current LeptoCOS page.');
      let html = await response.text();

      html = html.replace(
        '<title>LeptoCOS · A core outcome set for leptomeningeal disease</title>',
        '<title>LeptoCOS Beta · A core outcome set for leptomeningeal disease</title>'
      );
      html = html.replace(
        '<span class="wm"><span class="a">Lepto</span><span class="b">COS</span></span>',
        '<span class="wm"><span class="a">Lepto</span><span class="b">COS</span></span><span class="chip">Beta preview</span>'
      );

      html = html.replace('const total=21,W=2440,H=1120', 'const total=22,W=2440,H=1120');

      html = html.replace(
        'Registered as <b style="color:var(--ink)">COMET Initiative Study 3224</b> · conducted in accordance with COMET, COS-STAD and PRISMA.',
        'Registered as <b style="color:var(--ink)">COMET Initiative Study 3224</b> · developed in accordance with COMET and COS-STAD guidance; the systematic review was reported in accordance with PRISMA.'
      );

      html = html.replace('<h2>Methods and limitations</h2>', '<h2>Methods and scope</h2>');

      html = html.replace(
        '<footer><b>LeptoCOS</b> · a core outcome set for leptomeningeal disease · generated <span id="gd"></span>.',
        '<footer><b>LeptoCOS</b> · a core outcome set for leptomeningeal disease · Last updated July 21, 2026.'
      );
      html = html.replace(
        "document.getElementById('gd').textContent=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});",
        ''
      );

      html = html.replace(
        "el.querySelectorAll('.tm').forEach(t=>t.addEventListener('click',()=>{setCore(t.getAttribute('data-k'));gotoTable();}));",
        ''
      );
      html = html.replace(
        "el.querySelectorAll('.bar').forEach(b=>b.addEventListener('click',()=>{state.search=b.getAttribute('data-k');document.getElementById('search').value=state.search;gotoTable();render();}));",
        ''
      );
      html = html.replace(
        "hbars(document.getElementById('chart-gap'),CORE_ORDER.map(c=>({label:c,key:c,value:coreStudies[c]||0,color:CORE_COL[c]})),{max:studies.length,onClick:c=>{setCore(c);gotoTable();}});",
        "hbars(document.getElementById('chart-gap'),CORE_ORDER.map(c=>({label:c,key:c,value:coreStudies[c]||0,color:CORE_COL[c]})),{max:studies.length});"
      );
      html = html.replace(
        "hbars(document.getElementById('chart-sub'),subTop.map(([s,v])=>({label:s,key:s,value:v,color:CORE_COL[coreOfSub[s]]||'#889'})),\n  {onClick:s=>{state.search=s;document.getElementById('search').value=s;gotoTable();render();}});",
        "hbars(document.getElementById('chart-sub'),subTop.map(([s,v])=>({label:s,key:s,value:v,color:CORE_COL[coreOfSub[s]]||'#889'})),{});"
      );
      html = html.replace(
        "s+='</svg>';el.innerHTML=s;el.querySelectorAll('.bar').forEach(b=>b.addEventListener('click',()=>onClick(b.getAttribute('data-k'))));",
        "s+='</svg>';el.innerHTML=s;"
      );

      const feedbackCss = `
<style>
.lc-feedback-tab{position:fixed;right:22px;bottom:22px;z-index:9998;display:flex;align-items:center;gap:8px;border:0;border-radius:999px;padding:13px 17px;background:#193f69;color:#fff;font:750 13px/1 system-ui,-apple-system,"Segoe UI",sans-serif;letter-spacing:.01em;box-shadow:0 10px 30px rgba(20,44,73,.28);cursor:pointer;transition:background .2s ease,transform .2s ease}.lc-feedback-tab:hover{background:#245987;transform:translateY(-2px)}.lc-feedback-tab svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.9}
.lc-feedback-panel{position:fixed;right:22px;bottom:82px;z-index:9999;width:min(410px,calc(100vw - 32px));max-height:calc(100vh - 112px);overflow:auto;border:1px solid rgba(25,63,105,.14);border-radius:22px;background:rgba(255,255,255,.99);box-shadow:0 24px 70px rgba(20,44,73,.24);transform:translateY(24px) scale(.97);transform-origin:bottom right;opacity:0;pointer-events:none;transition:transform .26s ease,opacity .2s ease;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.lc-feedback-panel.is-open{transform:translateY(0) scale(1);opacity:1;pointer-events:auto}.lc-feedback-hero{position:relative;min-height:118px;padding:22px 24px 17px;overflow:hidden;color:#fff;background:linear-gradient(135deg,#173b64,#276d8a)}.lc-feedback-hero h3{position:relative;z-index:2;margin:0 38px 7px 0;font-size:21px;line-height:1.2}.lc-feedback-hero p{position:relative;z-index:2;margin:0;max-width:295px;color:rgba(255,255,255,.87);font-size:12.8px;line-height:1.5}.lc-feedback-close{position:absolute;right:14px;top:13px;z-index:3;width:32px;height:32px;border:1px solid rgba(255,255,255,.3);border-radius:50%;background:rgba(255,255,255,.1);color:#fff;font-size:21px;line-height:28px;cursor:pointer}.lc-feedback-network{position:absolute;inset:0;width:100%;height:100%;opacity:.5}.lc-feedback-network line{stroke:rgba(255,255,255,.42);stroke-width:1}.lc-feedback-network circle{fill:#fff;transform-box:fill-box;transform-origin:center;animation:lcPulse 2.8s ease-in-out infinite}.lc-feedback-network circle:nth-of-type(2){animation-delay:.45s}.lc-feedback-network circle:nth-of-type(3){animation-delay:.9s}.lc-feedback-network circle:nth-of-type(4){animation-delay:1.35s}.lc-feedback-network circle:nth-of-type(5){animation-delay:1.8s}@keyframes lcPulse{0%,100%{transform:scale(.78);opacity:.55}50%{transform:scale(1.38);opacity:1}}
.lc-feedback-body{padding:20px 22px 22px}.lc-feedback-intro{margin:0 0 14px;color:#33465b;font-size:13px;line-height:1.55}.lc-feedback-form{display:grid;gap:12px}.lc-field{display:grid;gap:5px}.lc-field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.lc-field label{color:#294966;font-size:11.5px;font-weight:750}.lc-field input,.lc-field select,.lc-field textarea{width:100%;box-sizing:border-box;border:1px solid #cbd8e2;border-radius:10px;background:#fff;color:#203247;font:13px/1.4 system-ui,-apple-system,"Segoe UI",sans-serif;padding:10px 11px;outline:none;transition:border-color .18s ease,box-shadow .18s ease}.lc-field textarea{min-height:112px;resize:vertical}.lc-field input:focus,.lc-field select:focus,.lc-field textarea:focus{border-color:#4b91a8;box-shadow:0 0 0 3px rgba(75,145,168,.14)}.lc-feedback-note{margin:1px 0 0;padding:10px 12px;border-left:3px solid #4b91a8;border-radius:0 9px 9px 0;background:#f7fafb;color:#586b7e;font-size:11.5px;line-height:1.45}.lc-feedback-submit{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;box-sizing:border-box;border:0;padding:13px 16px;border-radius:12px;background:#193f69;color:#fff;font-weight:760;font-size:14px;cursor:pointer;transition:background .2s ease,transform .2s ease}.lc-feedback-submit:hover{background:#245987;transform:translateY(-1px)}.lc-feedback-submit svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.9}.lc-feedback-status{min-height:18px;margin:0;text-align:center;color:#566c80;font-size:11.5px;line-height:1.4}.lc-honeypot{position:absolute!important;left:-9999px!important;width:1px!important;height:1px!important;overflow:hidden!important}
@media(max-width:600px){.lc-feedback-tab{right:16px;bottom:16px}.lc-feedback-panel{right:16px;bottom:74px;max-height:calc(100vh - 96px)}.lc-field-row{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){.lc-feedback-tab,.lc-feedback-panel,.lc-feedback-submit{transition:none}.lc-feedback-network circle{animation:none}}
</style>`;

      const feedbackMarkup = `
<button class="lc-feedback-tab" id="lcFeedbackTab" type="button" aria-controls="lcFeedbackPanel" aria-expanded="false">
  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5.5h16v10H9l-5 4z"/></svg>
  Feedback
</button>
<aside class="lc-feedback-panel" id="lcFeedbackPanel" role="dialog" aria-modal="false" aria-labelledby="lcFeedbackTitle" aria-hidden="true">
  <div class="lc-feedback-hero">
    <svg class="lc-feedback-network" viewBox="0 0 410 118" aria-hidden="true" preserveAspectRatio="none">
      <line x1="280" y1="15" x2="347" y2="43"/><line x1="347" y1="43" x2="315" y2="96"/><line x1="315" y1="96" x2="242" y2="70"/><line x1="242" y1="70" x2="280" y2="15"/><line x1="242" y1="70" x2="386" y2="84"/><line x1="347" y1="43" x2="386" y2="84"/>
      <circle cx="280" cy="15" r="4"/><circle cx="347" cy="43" r="5"/><circle cx="315" cy="96" r="4"/><circle cx="242" cy="70" r="5"/><circle cx="386" cy="84" r="4"/>
    </svg>
    <button class="lc-feedback-close" id="lcFeedbackClose" type="button" aria-label="Close feedback panel">×</button>
    <h3 id="lcFeedbackTitle">Help strengthen LeptoCOS</h3>
    <p>Share suggestions on terminology, taxonomy, definitions, clinical relevance, evidence mapping, or website usability.</p>
  </div>
  <div class="lc-feedback-body">
    <p class="lc-feedback-intro">Thank you for reviewing LeptoCOS. Your feedback will help improve the clarity, consistency, and usefulness of this resource.</p>
    <form class="lc-feedback-form" id="lcFeedbackForm">
      <div class="lc-field-row">
        <div class="lc-field">
          <label for="lcName">Name <span aria-hidden="true">(optional)</span></label>
          <input id="lcName" name="name" type="text" autocomplete="name">
        </div>
        <div class="lc-field">
          <label for="lcRole">Role or affiliation <span aria-hidden="true">(optional)</span></label>
          <input id="lcRole" name="role" type="text" autocomplete="organization">
        </div>
      </div>
      <div class="lc-field">
        <label for="lcEmail">Your email <span aria-hidden="true">(optional, for a reply)</span></label>
        <input id="lcEmail" name="email" type="email" autocomplete="email">
      </div>
      <div class="lc-field">
        <label for="lcArea">Feedback area</label>
        <select id="lcArea" name="area" required>
          <option value="">Select an area</option>
          <option>Outcome terminology</option>
          <option>Outcome taxonomy</option>
          <option>Outcome definitions</option>
          <option>Clinical relevance or missing concepts</option>
          <option>Mappings or potentially overlooked evidence</option>
          <option>Website clarity or usability</option>
          <option>Other</option>
        </select>
      </div>
      <div class="lc-field">
        <label for="lcMessage">Your feedback</label>
        <textarea id="lcMessage" name="message" required placeholder="Please describe your suggestion, correction, question, or concern."></textarea>
      </div>
      <div class="lc-field">
        <label for="lcReference">Relevant outcome, publication, page, or section <span aria-hidden="true">(optional)</span></label>
        <input id="lcReference" name="reference" type="text">
      </div>
      <div class="lc-honeypot" aria-hidden="true">
        <label for="lcWebsite">Leave this field empty</label>
        <input id="lcWebsite" name="website" type="text" tabindex="-1" autocomplete="off">
      </div>
      <p class="lc-feedback-note">Please do not include private health information. This form is for project feedback and is not monitored for medical advice or urgent concerns.</p>
      <button class="lc-feedback-submit" type="submit">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 6.5h17v11h-17z"/><path d="m4 7 8 6 8-6"/></svg>
        Send feedback
      </button>
      <p class="lc-feedback-status" id="lcFeedbackStatus" aria-live="polite">Your email app will open so you can review and send your message. The project email address is not displayed on this page.</p>
    </form>
  </div>
</aside>`;

      const feedbackScript = `
<script>
(function(){
  const tab=document.getElementById('lcFeedbackTab');
  const panel=document.getElementById('lcFeedbackPanel');
  const close=document.getElementById('lcFeedbackClose');
  const form=document.getElementById('lcFeedbackForm');
  const status=document.getElementById('lcFeedbackStatus');
  if(!tab||!panel||!close||!form||!status)return;
  function setOpen(open){
    panel.classList.toggle('is-open',open);
    panel.setAttribute('aria-hidden',String(!open));
    tab.setAttribute('aria-expanded',String(open));
    if(open)close.focus();
  }
  tab.addEventListener('click',function(){setOpen(!panel.classList.contains('is-open'));});
  close.addEventListener('click',function(){setOpen(false);tab.focus();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&panel.classList.contains('is-open')){setOpen(false);tab.focus();}});
  form.addEventListener('submit',function(e){
    e.preventDefault();
    if(document.getElementById('lcWebsite').value)return;
    if(!form.reportValidity())return;
    const recipient=String.fromCharCode(115,105,97,118,97,115,104,64,109,115,117,46,101,100,117);
    const area=document.getElementById('lcArea').value;
    const lines=[
      'Name: '+(document.getElementById('lcName').value.trim()||'Not provided'),
      'Role or affiliation: '+(document.getElementById('lcRole').value.trim()||'Not provided'),
      'Reply email: '+(document.getElementById('lcEmail').value.trim()||'Not provided'),
      'Feedback area: '+area,
      '',
      'Feedback:',
      document.getElementById('lcMessage').value.trim(),
      '',
      'Relevant outcome, publication, page, or section: '+(document.getElementById('lcReference').value.trim()||'Not provided')
    ];
    const subject='LeptoCOS feedback — '+area;
    status.textContent='Opening your email app with the feedback prefilled…';
    window.location.href='mailto:'+recipient+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(lines.join('\n'));
  });
})();
<\/script>`;

      html = html.replace('</head>', feedbackCss + '</head>');
      html = html.replace('</body>', feedbackMarkup + feedbackScript + '</body>');

      document.open();
      document.write(html);
      document.close();
    } catch (error) {
      status.className = 'loading error';
      status.textContent = error.message;
    }
  })();
  </script>
</body>
</html>
