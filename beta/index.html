      const coreChartFn=`
function renderCoreGapLarge(){
  const el=document.getElementById('chart-gap');if(!el)return;
  const items=CORE_ORDER.map(function(c){return{label:c,value:coreStudies[c]||0,color:CORE_COL[c]};});
  const W=760,padL=214,padR=64,rowH=62,top=20,H=top*2+items.length*rowH,mx=studies.length,bw=W-padL-padR;
  let s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" role="img" aria-label="Studies reporting each COMET core area">';
  items.forEach(function(it,i){
    const y=top+i*rowH,bh=31,w=Math.max(2,it.value/mx*bw);
    s+='<text x="'+(padL-13)+'" y="'+(y+21)+'" text-anchor="end" font-size="15" font-weight="600" fill="#333">'+esc(it.label)+'</text>';
    s+='<rect x="'+padL+'" y="'+y+'" width="'+w+'" height="'+bh+'" rx="4" fill="'+it.color+'"><title>'+esc(it.label)+': '+it.value+' studies</title></rect>';
    s+='<text x="'+(padL+w+10)+'" y="'+(y+21)+'" font-size="14" font-weight="600" fill="#555">'+it.value+'</text>';
  });
  s+='</svg>';el.innerHTML=s;
}
`;

      const feedbackScript=`
<script>
(function(){
  const tab=document.getElementById('lcFeedbackTab');
  const panel=document.getElementById('lcFeedbackPanel');
  const close=document.getElementById('lcFeedbackClose');
  const form=document.getElementById('lcFeedbackForm');
  const status=document.getElementById('lcFeedbackStatus');
  if(!tab||!panel||!close||!form||!status)return;
  function setOpen(open){panel.classList.toggle('is-open',open);panel.setAttribute('aria-hidden',String(!open));tab.setAttribute('aria-expanded',String(open));if(open)close.focus();}
  tab.addEventListener('click',function(){setOpen(!panel.classList.contains('is-open'));});
  close.addEventListener('click',function(){setOpen(false);tab.focus();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&panel.classList.contains('is-open')){setOpen(false);tab.focus();}});
  form.addEventListener('submit',function(e){
    e.preventDefault();
    if(document.getElementById('lcWebsite').value||!form.reportValidity())return;
    const recipient=String.fromCharCode(115,105,97,118,97,115,104,64,109,115,117,46,101,100,117);
    const area=document.getElementById('lcArea').value;
    const lines=[
      'Name: '+(document.getElementById('lcName').value.trim()||'Not provided'),
      'Role or affiliation: '+(document.getElementById('lcRole').value.trim()||'Not provided'),
      'Reply email: '+(document.getElementById('lcEmail').value.trim()||'Not provided'),
      'Feedback area: '+area,'','Feedback:',document.getElementById('lcMessage').value.trim(),'','Relevant outcome, publication, page, or section: '+(document.getElementById('lcReference').value.trim()||'Not provided')
    ];
    status.textContent='Opening your email app with the feedback prefilled…';
    window.location.href='mailto:'+recipient+'?subject='+encodeURIComponent('LeptoCOS feedback — '+area)+'&body='+encodeURIComponent(lines.join('\n'));
  });
})();
<\/script>`;
