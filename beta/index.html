<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>LeptoCOS Beta</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#171B23;background:#fff}
    .loading{max-width:720px;margin:80px auto;padding:0 24px;line-height:1.6}
    .error{color:#9A431B}
  </style>
</head>
<body>
  <div class="loading" id="status">Loading the LeptoCOS beta preview…</div>
  <script>
  (async function(){
    const status=document.getElementById('status');
    try{
      const response=await fetch('../index.html',{cache:'no-store'});
      if(!response.ok)throw new Error('Could not load the current LeptoCOS page.');
      let html=await response.text();

      html=html.replace(
        '<title>LeptoCOS · A core outcome set for leptomeningeal disease</title>',
        '<title>LeptoCOS Beta · A core outcome set for leptomeningeal disease</title>'
      );
      html=html.replace(
        '<span class="wm"><span class="a">Lepto</span><span class="b">COS</span></span>',
        '<span class="wm"><span class="a">Lepto</span><span class="b">COS</span></span><span class="chip">Beta preview</span>'
      );
      html=html.replace('const total=21,W=2440,H=1120','const total=22,W=2440,H=1120');
      html=html.replace(
        'Registered as <b style="color:var(--ink)">COMET Initiative Study 3224</b> · conducted in accordance with COMET, COS-STAD and PRISMA.',
        'Registered as <b style="color:var(--ink)">COMET Initiative Study 3224</b> · developed in accordance with COMET and COS-STAD guidance; the systematic review was reported in accordance with PRISMA.'
      );
      html=html.replace('<h2>Methods and limitations</h2>','<h2>Methods and scope</h2>');
      html=html.replace(
        '<footer><b>LeptoCOS</b> · a core outcome set for leptomeningeal disease · generated <span id="gd"></span>.',
        '<footer><b>LeptoCOS</b> · a core outcome set for leptomeningeal disease · Last updated July 21, 2026.'
      );
      html=html.replace("document.getElementById('gd').textContent=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});",'');
      html=html.replace("el.querySelectorAll('.tm').forEach(t=>t.addEventListener('click',()=>{setCore(t.getAttribute('data-k'));gotoTable();}));",'');
      html=html.replace("el.querySelectorAll('.bar').forEach(b=>b.addEventListener('click',()=>{state.search=b.getAttribute('data-k');document.getElementById('search').value=state.search;gotoTable();render();}));",'');

      const coreChartFn=`
function renderCoreGapLarge(){
  const el=document.getElementById('chart-gap');if(!el)return;
  const items=CORE_ORDER.map(function(c){return{label:c,value:coreStudies[c]||0,color:CORE_COL[c]};});
  const W=760,padL=214,padR=64,rowH=62,top=20,H=top*2+items.length*rowH,mx=studies.length,bw=W-padL-padR;
  let s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" role="img" aria-label="Studies reporting each COMET core area">';
  items.forEach(function(it,i){
    const y=top+i*rowH,bh=31,w=Math.max(2,it.value/mx*bw);
    s+='<text x="'+(padL-13)+'" y="'+(y+21)+'" text-anchor="end" font-size="15" font-weight="600" fill="#333">'+esc(it.label)+'</text>';
    s+='<rect x="'+padL+'" y="'+y+'" width="'+w+'" height="'+bh+'" rx="4" fill="'+it.color+'"><title>'+esc(it.label)+': '+it.value+' studies</title></rect>';
    s+='<text x="'+(padL+w+10)+'" y="'+(y+21)+'" font-size="14" font-weight="600" fill="#555">'+it.value+'</text>';
  });
  s+='</svg>';el.innerHTML=s;
}
`;
      html=html.replace('/* ---- charts ---- */',coreChartFn+'/* ---- charts ---- */');
      html=html.replace(
        "hbars(document.getElementById('chart-gap'),CORE_ORDER.map(c=>({label:c,key:c,value:coreStudies[c]||0,color:CORE_COL[c]})),{max:studies.length,onClick:c=>{setCore(c);gotoTable();}});",
        'renderCoreGapLarge();'
      );
      html=html.replace(
        "hbars(document.getElementById('chart-sub'),subTop.map(([s,v])=>({label:s,key:s,value:v,color:CORE_COL[coreOfSub[s]]||'#889'})),\n  {onClick:s=>{state.search=s;document.getElementById('search').value=s;gotoTable();render();}});",
        "hbars(document.getElementById('chart-sub'),subTop.map(([s,v])=>({label:s,key:s,value:v,color:CORE_COL[coreOfSub[s]]||'#889'})),{});"
      );
      html=html.replace(
        "s+='</svg>';el.innerHTML=s;el.querySelectorAll('.bar').forEach(b=>b.addEventListener('click',()=>onClick(b.getAttribute('data-k'))));",
        "s+='</svg>';el.innerHTML=s;"
      );

      html=html.replace(
        '<tr><th class="rl"></th><th>Leptomeningeal<small>LM</small></th><th>Intracranial<small>brain</small></th><th>Extracranial<small>systemic</small></th><th>Overall<small>IC + EC</small></th><th class="ncol">n</th></tr>',
        '<tr><th class="group-col"></th><th class="rl">Metric</th><th>Leptomeningeal<small>LM</small></th><th>Intracranial<small>brain</small></th><th>Extracranial<small>systemic</small></th><th>Overall<small>IC + EC</small></th><th class="ncol">n</th></tr>'
      );
      html=html.replace(
        '            <tr class="ghdr"><td colspan="6">Response</td></tr>\n            <tr><td class="rl">Response</td>',
        '            <tr class="group-start response-start"><td class="groupcell" rowspan="5"><span>Response</span></td><td class="rl">Response</td>'
      );
      html=html.replace(
        '            <tr class="ghdr"><td colspan="6">Progression</td></tr>\n            <tr><td class="rl">PFS</td>',
        '            <tr class="group-start section-start"><td class="groupcell" rowspan="2"><span>Progression</span></td><td class="rl">PFS</td>'
      );
      html=html.replace(
        '            <tr class="ghdr"><td colspan="6">Other</td></tr>\n            <tr><td class="rl">Other</td>',
        '            <tr class="group-start section-start"><td class="groupcell" rowspan="1"><span>Other</span></td><td class="rl">Other</td>'
      );
      html=html.replace(
        '<tr><td class="rl">All compartments</td><td>71</td><td>32</td><td>30</td><td>31</td><td class="ncol">164</td></tr>',
        '<tr><td class="group-total"></td><td class="rl">All compartments</td><td>71</td><td>32</td><td>30</td><td>31</td><td class="ncol">164</td></tr>'
      );

      const layoutCss=`
<style id="lc-layout-fixes">
#landscape #chart-gap{margin-top:18px;padding:4px 0 8px}
#landscape #chart-gap svg{display:block!important;width:100%!important;min-height:350px!important}
#compartment .cmx{min-width:760px!important;border-collapse:separate!important;border-spacing:0!important}
#compartment .cmx th.group-col{width:104px!important;min-width:104px!important;padding:0!important;cursor:default!important;border-bottom:1px solid var(--line)!important}
#compartment .cmx th.rl{text-align:left!important;padding-left:16px!important}
#compartment .cmx td.groupcell{width:104px!important;min-width:104px!important;padding:12px 12px 0 0!important;vertical-align:top!important;text-align:right!important;border:0!important;border-right:1px solid #E5EAF0!important;background:transparent!important;color:#5C6675!important}
#compartment .cmx td.groupcell span{display:inline-flex!important;align-items:center!important;justify-content:center!important;padding:5px 9px!important;border:1px solid #E1E7EE!important;border-radius:999px!important;background:#F7F9FB!important;color:#5C6675!important;font-size:9.5px!important;font-weight:800!important;letter-spacing:.12em!important;text-transform:uppercase!important;line-height:1.2!important}
#compartment .cmx td.rl{padding-left:16px!important}
#compartment .cmx tr.section-start td:not(.groupcell){border-top:18px solid #fff!important}
#compartment .cmx tr.section-start td.groupcell{padding-top:30px!important}
#compartment .cmx tr.response-start td:not(.groupcell){border-top-width:2px!important}
#compartment .cmx td.group-total{border:0!important;border-right:1px solid #E5EAF0!important;border-top:1px solid var(--line)!important;background:#fff!important}
@media(max-width:860px){#landscape #chart-gap svg{min-height:310px!important}}
</style>`;

      const feedbackCss=`
<style id="lc-feedback-styles">
#lcFeedbackTab{position:fixed!important;right:28px!important;bottom:28px!important;top:auto!important;left:auto!important;z-index:2147483646!important;display:flex!important;align-items:center!important;justify-content:center!important;gap:10px!important;min-width:172px!important;min-height:58px!important;margin:0!important;padding:16px 23px!important;border:1px solid rgba(255,255,255,.24)!important;border-radius:999px!important;background:linear-gradient(135deg,#173b64,#245f83)!important;color:#fff!important;font:800 16px/1 system-ui,-apple-system,"Segoe UI",sans-serif!important;letter-spacing:.01em!important;box-shadow:0 14px 40px rgba(15,43,72,.38),0 0 0 7px rgba(36,95,131,.10)!important;cursor:pointer!important;visibility:visible!important;opacity:1!important;transform:none!important;transition:transform .2s ease,box-shadow .2s ease!important}
#lcFeedbackTab:hover{transform:translateY(-3px)!important;box-shadow:0 18px 46px rgba(15,43,72,.42),0 0 0 8px rgba(36,95,131,.13)!important}
#lcFeedbackTab svg{width:22px!important;height:22px!important;fill:none!important;stroke:currentColor!important;stroke-width:1.9!important}
#lcFeedbackPanel{position:fixed!important;right:28px!important;bottom:100px!important;top:auto!important;left:auto!important;z-index:2147483647!important;width:min(430px,calc(100vw - 36px))!important;max-height:calc(100vh - 132px)!important;margin:0!important;overflow:auto!important;border:1px solid rgba(25,63,105,.15)!important;border-radius:24px!important;background:rgba(255,255,255,.995)!important;box-shadow:0 28px 80px rgba(20,44,73,.30)!important;transform:translateY(22px) scale(.97)!important;transform-origin:bottom right!important;opacity:0!important;visibility:hidden!important;pointer-events:none!important;transition:transform .25s ease,opacity .2s ease,visibility .2s ease!important;font-family:system-ui,-apple-system,"Segoe UI",sans-serif!important}
#lcFeedbackPanel.is-open{transform:translateY(0) scale(1)!important;opacity:1!important;visibility:visible!important;pointer-events:auto!important}
.lc-feedback-hero{position:relative!important;min-height:124px!important;padding:24px 26px 19px!important;overflow:hidden!important;color:#fff!important;background:linear-gradient(135deg,#173b64,#276d8a)!important}
.lc-feedback-hero h3{position:relative!important;z-index:2!important;margin:0 42px 8px 0!important;font-size:23px!important;line-height:1.2!important;color:#fff!important}
.lc-feedback-hero p{position:relative!important;z-index:2!important;margin:0!important;max-width:310px!important;color:rgba(255,255,255,.88)!important;font-size:13.5px!important;line-height:1.5!important}
#lcFeedbackClose{position:absolute!important;right:15px!important;top:14px!important;z-index:3!important;width:34px!important;height:34px!important;margin:0!important;padding:0!important;border:1px solid rgba(255,255,255,.34)!important;border-radius:50%!important;background:rgba(255,255,255,.12)!important;color:#fff!important;font-size:22px!important;cursor:pointer!important}
.lc-feedback-network{position:absolute!important;inset:0!important;width:100%!important;height:100%!important;opacity:.58!important;pointer-events:none!important}
.lc-feedback-network .network-cluster{transform-origin:330px 62px;animation:lcNetworkDrift 9s ease-in-out infinite alternate!important}
.lc-feedback-network line{stroke:rgba(255,255,255,.48)!important;stroke-width:1.1!important;stroke-dasharray:5 6!important;animation:lcLineFlow 5s linear infinite!important}
.lc-feedback-network circle{fill:#fff!important;transform-box:fill-box!important;transform-origin:center!important}
.lc-feedback-network .n1{animation:lcNode1 5.3s ease-in-out infinite!important}.lc-feedback-network .n2{animation:lcNode2 4.7s ease-in-out infinite!important}.lc-feedback-network .n3{animation:lcNode3 5.8s ease-in-out infinite!important}.lc-feedback-network .n4{animation:lcNode4 4.9s ease-in-out infinite!important}.lc-feedback-network .n5{animation:lcNode5 5.5s ease-in-out infinite!important}
@keyframes lcNetworkDrift{0%{transform:translate(-4px,2px) rotate(-1deg)}100%{transform:translate(6px,-3px) rotate(1.4deg)}}
@keyframes lcLineFlow{to{stroke-dashoffset:-44}}
@keyframes lcNode1{0%,100%{transform:translate(0,0) scale(.9);opacity:.55}50%{transform:translate(4px,-5px) scale(1.35);opacity:1}}
@keyframes lcNode2{0%,100%{transform:translate(0,0) scale(.86);opacity:.6}50%{transform:translate(-5px,4px) scale(1.28);opacity:1}}
@keyframes lcNode3{0%,100%{transform:translate(0,0) scale(.9);opacity:.58}50%{transform:translate(5px,3px) scale(1.32);opacity:1}}
@keyframes lcNode4{0%,100%{transform:translate(0,0) scale(.84);opacity:.55}50%{transform:translate(-4px,-4px) scale(1.3);opacity:1}}
@keyframes lcNode5{0%,100%{transform:translate(0,0) scale(.88);opacity:.6}50%{transform:translate(3px,5px) scale(1.25);opacity:1}}
.lc-feedback-body{padding:22px 24px 24px!important}.lc-feedback-intro{margin:0 0 15px!important;color:#33465b!important;font-size:13.5px!important;line-height:1.55!important}.lc-feedback-form{display:grid!important;gap:13px!important}.lc-field{display:grid!important;gap:6px!important}.lc-field label{color:#294966!important;font-size:12px!important;font-weight:750!important}.lc-field input,.lc-field select,.lc-field textarea{display:block!important;width:100%!important;box-sizing:border-box!important;margin:0!important;border:1px solid #cbd8e2!important;border-radius:11px!important;background:#fff!important;color:#203247!important;font:13.5px/1.4 system-ui,-apple-system,"Segoe UI",sans-serif!important;padding:11px 12px!important;outline:none!important}.lc-field textarea{min-height:118px!important;resize:vertical!important}.lc-field input:focus,.lc-field select:focus,.lc-field textarea:focus{border-color:#4b91a8!important;box-shadow:0 0 0 3px rgba(75,145,168,.14)!important}
.lc-optional{border:1px solid #D8E1E9!important;border-radius:12px!important;background:#F8FAFC!important;overflow:hidden!important}.lc-optional summary{display:flex!important;align-items:center!important;justify-content:space-between!important;gap:10px!important;padding:12px 14px!important;color:#294966!important;font-size:12.5px!important;font-weight:750!important;cursor:pointer!important;list-style:none!important}.lc-optional summary::-webkit-details-marker{display:none!important}.lc-optional summary::after{content:'+'!important;display:grid!important;place-items:center!important;width:22px!important;height:22px!important;border-radius:50%!important;background:#E8EEF4!important;color:#31526E!important;font-size:16px!important;line-height:1!important;transition:transform .2s ease!important}.lc-optional[open] summary::after{content:'−'!important;transform:rotate(180deg)!important}.lc-optional-grid{display:grid!important;gap:11px!important;padding:13px 14px 14px!important;border-top:1px solid #E4EAF0!important}
.lc-feedback-note{margin:1px 0 0!important;padding:11px 13px!important;border-left:3px solid #4b91a8!important;border-radius:0 9px 9px 0!important;background:#F7FAFB!important;color:#586B7E!important;font-size:11.5px!important;line-height:1.45!important}.lc-feedback-submit{display:flex!important;align-items:center!important;justify-content:center!important;gap:8px!important;width:100%!important;box-sizing:border-box!important;margin:0!important;border:0!important;padding:14px 17px!important;border-radius:12px!important;background:#193F69!important;color:#fff!important;font-weight:780!important;font-size:14.5px!important;cursor:pointer!important}.lc-feedback-status{min-height:18px!important;margin:0!important;text-align:center!important;color:#566C80!important;font-size:11.5px!important;line-height:1.4!important}
@media(max-width:600px){#lcFeedbackTab{right:18px!important;bottom:18px!important;min-width:162px!important;min-height:56px!important;font-size:15px!important}#lcFeedbackPanel{right:18px!important;bottom:88px!important;width:calc(100vw - 36px)!important;max-height:calc(100vh - 112px)!important}}
@media(prefers-reduced-motion:reduce){#lcFeedbackTab,#lcFeedbackPanel,.lc-feedback-network .network-cluster,.lc-feedback-network line,.lc-feedback-network circle{transition:none!important;animation:none!important}}
</style>`;

      const feedbackMarkup=`
<button id="lcFeedbackTab" type="button" aria-controls="lcFeedbackPanel" aria-expanded="false" onclick="var p=document.getElementById('lcFeedbackPanel'),o=!p.classList.contains('is-open');p.classList.toggle('is-open',o);p.setAttribute('aria-hidden',String(!o));this.setAttribute('aria-expanded',String(o));if(o)document.getElementById('lcFeedbackClose').focus();">
  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5.5h16v10H9l-5 4z"/></svg>Share feedback
</button>
<aside id="lcFeedbackPanel" role="dialog" aria-modal="false" aria-labelledby="lcFeedbackTitle" aria-hidden="true">
  <div class="lc-feedback-hero">
    <svg class="lc-feedback-network" viewBox="0 0 430 124" aria-hidden="true" preserveAspectRatio="none">
      <g class="network-cluster">
        <line x1="295" y1="16" x2="365" y2="45"/><line x1="365" y1="45" x2="332" y2="101"/><line x1="332" y1="101" x2="255" y2="73"/><line x1="255" y1="73" x2="295" y2="16"/><line x1="255" y1="73" x2="405" y2="89"/><line x1="365" y1="45" x2="405" y2="89"/>
        <circle class="n1" cx="295" cy="16" r="4"/><circle class="n2" cx="365" cy="45" r="5"/><circle class="n3" cx="332" cy="101" r="4"/><circle class="n4" cx="255" cy="73" r="5"/><circle class="n5" cx="405" cy="89" r="4"/>
      </g>
    </svg>
    <button id="lcFeedbackClose" type="button" aria-label="Close feedback panel" onclick="var p=document.getElementById('lcFeedbackPanel'),t=document.getElementById('lcFeedbackTab');p.classList.remove('is-open');p.setAttribute('aria-hidden','true');t.setAttribute('aria-expanded','false');t.focus();">×</button>
    <h3 id="lcFeedbackTitle">Help strengthen LeptoCOS</h3>
    <p>Share suggestions on terminology, taxonomy, definitions, clinical relevance, evidence mapping, or website usability.</p>
  </div>
  <div class="lc-feedback-body">
    <p class="lc-feedback-intro">Thank you for reviewing LeptoCOS. Your feedback will help improve the clarity, consistency, and usefulness of this resource.</p>
    <form class="lc-feedback-form" id="lcFeedbackForm" onsubmit="event.preventDefault();var e=this.elements,a=String.fromCharCode(115,105,97,118,97,115,104,64,109,115,117,46,101,100,117),n=String.fromCharCode(10),b='Name: '+(e.name.value||'Not provided')+n+'Role or affiliation: '+(e.role.value||'Not provided')+n+'Reply email: '+(e.reply.value||'Not provided')+n+'Feedback area: '+e.area.value+n+n+'Feedback:'+n+e.message.value+n+n+'Relevant outcome, publication, page, or section: '+(e.reference.value||'Not provided');location.href='mailto:'+a+'?subject='+encodeURIComponent('LeptoCOS feedback — '+e.area.value)+'&body='+encodeURIComponent(b);return false;">
      <div class="lc-field"><label for="lcArea">Feedback area</label><select id="lcArea" name="area" required><option value="">Select an area</option><option>Outcome terminology</option><option>Outcome taxonomy</option><option>Outcome definitions</option><option>Clinical relevance or missing concepts</option><option>Mappings or potentially overlooked evidence</option><option>Website clarity or usability</option><option>Other</option></select></div>
      <div class="lc-field"><label for="lcMessage">Your feedback</label><textarea id="lcMessage" name="message" required placeholder="Please describe your suggestion, correction, question, or concern."></textarea></div>
      <details class="lc-optional">
        <summary>Add optional details</summary>
        <div class="lc-optional-grid">
          <div class="lc-field"><label for="lcName">Name</label><input id="lcName" name="name" type="text" autocomplete="name"></div>
          <div class="lc-field"><label for="lcRole">Role or affiliation</label><input id="lcRole" name="role" type="text" autocomplete="organization"></div>
          <div class="lc-field"><label for="lcEmail">Your email, for a reply</label><input id="lcEmail" name="reply" type="email" autocomplete="email"></div>
          <div class="lc-field"><label for="lcReference">Relevant outcome, publication, page, or section</label><input id="lcReference" name="reference" type="text"></div>
        </div>
      </details>
      <p class="lc-feedback-note">Please do not include private health information. This form is for project feedback and is not monitored for medical advice or urgent concerns.</p>
      <button class="lc-feedback-submit" type="submit">Send feedback</button>
      <p class="lc-feedback-status">Your email app will open with the message prefilled. The project email address is not displayed on this page.</p>
    </form>
  </div>
</aside>`;

      html=html.replace('</head>',layoutCss+feedbackCss+'</head>');
      html=html.replace('</body>',feedbackMarkup+'</body>');
      document.open();document.write(html);document.close();
    }catch(error){status.className='loading error';status.textContent=error.message;}
  })();
  </script>
</body>
</html>
